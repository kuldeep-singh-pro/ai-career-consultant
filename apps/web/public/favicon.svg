<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="careerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Head outline -->
  <circle
    cx="32"
    cy="26"
    r="18"
    fill="none"
    stroke="url(#careerGrad)"
    stroke-width="3"
  />

  <!-- Jaw -->
  <path
    d="M14 30 Q32 46 50 30"
    fill="none"
    stroke="#4F46E5"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Divider (Human | AI) -->
  <line
    x1="32"
    y1="8"
    x2="32"
    y2="38"
    stroke="#A5B4FC"
    stroke-width="2"
    stroke-dasharray="3 3"
  />

  <!-- Career growth nodes -->
  <circle cx="24" cy="32" r="2.8" fill="#818CF8"/>
  <circle cx="21" cy="23" r="3" fill="#EEF2FF"/>
  <circle cx="27" cy="15" r="2.5" fill="#C7D2FE"/>

  <!-- Path between nodes -->
  <path
    d="M24 32 C22 28 20 26 21 23
       C22 20 24 18 27 15"
    fill="none"
    stroke="#6366F1"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>